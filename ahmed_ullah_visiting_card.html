
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #app {
    min-height: 620px;
    background: #080b12;
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 44px 24px;
    font-family: 'DM Sans', sans-serif;
  }
  .bg-lines {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,200,80,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,200,80,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .bg-glow {
    position: absolute;
    width: 500px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(210,140,30,0.10) 0%, transparent 70%);
    top: -60px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }
  .bg-glow2 {
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(210,140,30,0.06) 0%, transparent 70%);
    bottom: -80px; right: -60px;
    pointer-events: none;
  }
  .screen { position: relative; z-index: 2; width: 100%; max-width: 360px; }

  /* LOCKED */
  #locked { text-align: center; }
  .monogram-ring {
    width: 84px; height: 84px; border-radius: 50%;
    border: 1.5px solid rgba(210,160,40,0.35);
    margin: 0 auto 18px;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 35% 35%, #1e1a0e, #0e0c07);
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px; font-weight: 700;
    color: #d4a832;
    letter-spacing: 1px;
    box-shadow: 0 0 30px rgba(210,160,40,0.12);
  }
  .name-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px; font-weight: 700;
    color: #f5e9c8;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
  }
  .name-alias {
    font-size: 11px;
    color: #d4a832;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .qr-frame {
    display: inline-block;
    padding: 14px;
    background: white;
    border-radius: 16px;
    margin-bottom: 20px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 0 0 rgba(212,168,50,0);
  }
  .qr-frame:hover {
    transform: scale(1.03);
    box-shadow: 0 0 40px rgba(212,168,50,0.3);
  }
  .scan-hint {
    font-size: 12px; color: rgba(255,255,255,0.28);
    letter-spacing: 1.5px; text-transform: uppercase;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 28px;
  }
  .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #d4a832;
    animation: pdot 1.8s ease-in-out infinite;
  }
  @keyframes pdot {
    0%,100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }
  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,168,50,0.4), transparent);
    margin: 0 auto 24px;
  }
  .demo-btn {
    padding: 11px 32px; border-radius: 50px;
    border: 1px solid rgba(212,168,50,0.4);
    background: rgba(212,168,50,0.08);
    color: #d4a832;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .demo-btn:hover { background: rgba(212,168,50,0.18); border-color: #d4a832; }

  /* TRANSITION */
  #transition {
    display: none; position: absolute; inset: 0; z-index: 10;
    background: #080b12; border-radius: 20px;
    flex-direction: column; gap: 14px;
    align-items: center; justify-content: center;
  }
  .gold-ring {
    width: 56px; height: 56px; border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: #d4a832;
    border-right-color: rgba(212,168,50,0.3);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .scan-text { font-size: 11px; color: rgba(212,168,50,0.5); letter-spacing: 3px; text-transform: uppercase; }

  /* UNLOCKED */
  #unlocked { display: none; }
  .unlocked-header { text-align: center; margin-bottom: 28px; }
  .avatar-gold {
    width: 68px; height: 68px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #2a2010, #0e0c07);
    border: 1.5px solid rgba(212,168,50,0.5);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 700; color: #d4a832;
    margin: 0 auto 12px;
    box-shadow: 0 0 20px rgba(212,168,50,0.15);
  }
  .unlocked-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 700; color: #f5e9c8; margin-bottom: 3px;
  }
  .unlocked-alias { font-size: 11px; color: #d4a832; letter-spacing: 3px; text-transform: uppercase; }

  .socials-grid { display: flex; flex-direction: column; gap: 10px; }
  .social-card {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 16px;
    border-radius: 13px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03);
    cursor: pointer; text-decoration: none;
    transition: all 0.22s;
    animation: slideUp 0.45s ease both;
  }
  .social-card:hover {
    border-color: rgba(212,168,50,0.25);
    background: rgba(212,168,50,0.06);
    transform: translateX(5px);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .social-card:nth-child(1) { animation-delay: 0.04s; }
  .social-card:nth-child(2) { animation-delay: 0.12s; }
  .social-card:nth-child(3) { animation-delay: 0.20s; }
  .social-card:nth-child(4) { animation-delay: 0.28s; }

  .social-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .social-info { flex: 1; }
  .social-name { font-size: 13px; font-weight: 500; color: #f0e8d0; margin-bottom: 2px; }
  .social-handle { font-size: 11px; color: rgba(255,255,255,0.28); }
  .social-arrow { font-size: 18px; color: rgba(212,168,50,0.3); transition: color 0.2s; }
  .social-card:hover .social-arrow { color: rgba(212,168,50,0.8); }

  .footer-badge {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    font-size: 10px; color: rgba(255,255,255,0.18); margin-top: 22px;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .footer-badge::before {
    content: ''; display: inline-block; width: 5px; height: 5px;
    border-radius: 50%; background: #d4a832; opacity: 0.7;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  new QRCode(document.getElementById("qrCanvas"), {
    text: "https://ahmedullah.me",
    width: 190,
    height: 190,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });

  function simulateScan() {
    var t = document.getElementById('transition');
    t.style.display = 'flex';
    setTimeout(function() {
      t.style.display = 'none';
      document.getElementById('locked').style.display = 'none';
      document.getElementById('unlocked').style.display = 'block';
    }, 1500);
  }
</script>
