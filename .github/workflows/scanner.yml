name: Cloud Scanner
on:
  repository_dispatch:
    types: [new_photo]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Critical for saving the PDF
    steps:
      - uses: actions/checkout@v4
      - name: Install Tools
        run: pip install opencv-python-headless numpy img2pdf requests
      - name: Run Multi-Page Scan
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          FILE_URL: ${{ github.event.client_payload.file_url }}
        run: python scripts/process_photos.py
      - name: Save to Repo
        run: |
          git config --global user.name "Scanner-Bot"
          git config --global user.email "bot@github.com"
          git add Scans/
          git commit -m "Added multi-page PDF" || echo "No changes"
          git push
