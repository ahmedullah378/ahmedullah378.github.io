name: Cloud Scanner
on:
  repository_dispatch:
    types: [new_photo]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install All Tools
        run: |
          pip install opencv-python-headless numpy img2pdf requests
          
      - name: Run Multi-Page Scan
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          FILE_URL: ${{ github.event.client_payload.file_url }}
        run: |
          # Finds the script even if it's in a subfolder
          SCRIPT=$(find . -name "process_photos.py" | head -n 1)
          python "$SCRIPT"
          
      - name: Save to Portfolio
        run: |
          git config --global user.name "Scanner-Bot"
          git config --global user.email "bot@github.com"
          git add Scans/
          git commit -m "Automated Multi-page PDF Update" || echo "No changes"
          git push
