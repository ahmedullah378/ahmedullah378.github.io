name: Cloud Scanner (5-Min Auto)
on:
  schedule:
    - cron: '*/5 * * * *' # Fast as GitHub allows
  workflow_dispatch:
  repository_dispatch:
    types: [new_photo]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install Libraries
        run: pip install opencv-python-headless numpy img2pdf requests slack_sdk
          
      - name: Run Auto-Processor
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL_ID: "C0B0LFFAHM5"
        run: python scripts/process_photos.py
          
      - name: Save & Sync Archive
        run: |
          git config --global user.name "Scanner-Bot"
          git config --global user.email "bot@github.com"
          mkdir -p Scans
          git add Scans/
          git commit -m "Automated Sync - Document Archive" || echo "No changes"
          git push
