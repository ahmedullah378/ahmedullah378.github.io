name: Cloud Scanner
on:
  repository_dispatch:
    types: [new_photo]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install All Tools
        run: |
          pip install opencv-python-headless numpy img2pdf requests
          
      - name: Run Multi-Page Scan
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          FILE_URL: ${{ github.event.client_payload.file_url }}
        # Directly pointing to the file in your scripts folder
        run: python scripts/process_photos.py
          
      - name: Save to Portfolio
        run: |
          git config --global user.name "Scanner-Bot"
          git config --global user.email "bot@github.com"
          mkdir -p Scans
          git add Scans/
          git commit -m "Automated Multi-page PDF Update" || echo "No changes"
          git push
