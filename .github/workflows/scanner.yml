name: Cloud Scanner
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Tools
        run: pip install opencv-python-headless numpy img2pdf requests slack_sdk
      - name: Run Processing Script
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL_ID: "C0B0LFFAHM5"
        run: python scripts/process_photos.py
      - name: Save Archive
        run: |
          git config --global user.name "Scanner-Bot"
          git config --global user.email "bot@github.com"
          mkdir -p Scans
          git add Scans/
          git commit -m "Automated Sync" || echo "No changes"
          git push