name: Cloud Scanner
on:
  repository_dispatch:
    types: [new_photo]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for counting previous files
      
      - name: Install All Tools
        run: |
          pip install opencv-python-headless numpy img2pdf requests slack_sdk
          
      - name: Run Auto-Processor
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          FILE_URL: ${{ github.event.client_payload.file_url }}
          CHANNEL_ID: "C0B0LFFAHM5"
        run: python scripts/process_photos.py
          
      - name: Save to Portfolio
        run: |
          git config --global user.name "Scanner-Bot"
          git config --global user.email "bot@github.com"
          git add Scans/
          git commit -m "Automated Multi-page PDF Update" || echo "No changes"
          git push
