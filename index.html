<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Ullah | The Operator</title>
    <link rel="preload" as="image" href="profile.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --bg: #04070a; /* Darker liquid-like base */
            --glass: rgba(255, 255, 255, 0.05);
            --liquid-border: rgba(197, 160, 89, 0.2);
            --glow: rgba(197, 160, 89, 0.1);
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #0a1017 0%, #04070a 100%);
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 0;
            overflow-x: hidden;
        }

        /* The Liquid Reveal Container */
        .container {
            width: 90%;
            max-width: 350px;
            text-align: center;
            opacity: 0;
            filter: blur(10px); /* Liquid start */
            transform: scale(0.95) translateY(20px);
            animation: liquidReveal 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes liquidReveal {
            to { 
                opacity: 1; 
                filter: blur(0);
                transform: scale(1) translateY(0);
            }
        }

        /* Frosted Glass Wrapper for Image */
        .img-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: blur(8px);
            border: 1px solid var(--liquid-border);
            padding: 4px;
            box-shadow: 0 0 30px var(--glow);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            opacity: 0.9;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 500;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .sub {
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 12px 0 35px;
            display: block;
            opacity: 0.8;
            font-weight: 400;
        }

        /* Glass Project Card */
        .section-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .project-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--liquid-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 35px;
            text-align: left;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.02);
            transition: all 0.5s ease;
        }

        .project-card:hover {
            border-color: var(--gold);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), 0 0 15px var(--glow);
        }

        .project-card h3 {
            font-size: 0.85rem;
            margin: 0 0 8px;
            color: var(--gold);
            letter-spacing: 1px;
        }

        .project-card p {
            font-size: 0.75rem;
            line-height: 1.6;
            margin: 0;
            color: rgba(255,255,255,0.6);
        }

        /* Frosted Glass Buttons */
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
            padding: 16px 22px;
            border-radius: 18px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: rgba(197, 160, 89, 0.1);
            border-color: var(--gold);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .whatsapp {
            border-color: rgba(37, 211, 102, 0.2);
            color: #25D366;
        }

        .whatsapp:hover {
            background: rgba(37, 211, 102, 0.1);
            border-color: #25D366;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="img-wrapper">
            <img src="profile.jpg" alt="Ahmed Ullah">
        </div>
        
        <h1>Ahmed Ullah</h1>
        <span class="sub">THE OPERATOR</span>

        <div class="section-label">Featured Project</div>
        <div class="project-card">
            <h3>Hub-and-Spoke Automation</h3>
            <p>A sophisticated Python pipeline bridging Slack and GitHub to automate document synchronization and image processing.</p>
        </div>

        <div class="section-label">Connect</div>
        <div class="links">
            <a href="https://facebook.com/Ahmedullah3778" target="_blank" class="btn">
                <span>Facebook</span>
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="https://instagram.com/highlypraised_78" target="_blank" class="btn">
                <span>Instagram</span>
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://tiktok.com/@ahmed_ullah.78" target="_blank" class="btn">
                <span>TikTok</span>
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://wa.me/8801806639158" target="_blank" class="btn whatsapp">
                <span>WhatsApp</span>
                <i class="fab fa-whatsapp"></i>
            </a>
        </div>
    </div>

</body>
</html>
