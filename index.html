<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Ullah | The Operator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --dark-bg: #070B0F;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(197, 160, 89, 0.2);
        }

        body {
            background-color: var(--dark-bg);
            color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 340px;
            text-align: center;
            animation: reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid var(--gold);
            padding: 4px;
            margin: 0 auto 20px;
            display: block;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.15);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 0;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 10px 0 40px;
            display: block;
            font-weight: 400;
            opacity: 0.8;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 22px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.9);
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.4s ease;
            font-size: 0.9rem;
            font-weight: 400;
        }

        .btn:hover {
            background: rgba(197, 160, 89, 0.08);
            border-color: var(--gold);
            transform: translateY(-2px);
            color: #FFF;
        }

        .btn i {
            font-size: 1rem;
            width: 20px;
            text-align: center;
        }

        /* WhatsApp special styling */
        .btn-wa {
            border-color: rgba(37, 211, 102, 0.2);
        }
        .btn-wa:hover {
            border-color: #25D366;
            background: rgba(37, 211, 102, 0.05);
        }

    </style>
</head>
<body>

    <div class="main-container">
        <img src="profile.png" alt="Ahmed Ullah" class="profile-img">
        
        <h1>Ahmed Ullah</h1>
        <span class="subtitle">THE OPERATOR</span>

        <div class="links-stack">
            <a href="https://facebook.com/Ahmedullah3778" target="_blank" class="btn">
                <span class="btn-text">Facebook</span>
                <i class="fab fa-facebook-f"></i>
            </a>
            
            <a href="https://instagram.com/highlypraised_78" target="_blank" class="btn">
                <span class="btn-text">Instagram</span>
                <i class="fab fa-instagram"></i>
            </a>
            
            <a href="https://tiktok.com/@ahmed_ullah.78" target="_blank" class="btn">
                <span class="btn-text">TikTok</span>
                <i class="fab fa-tiktok"></i>
            </a>

            <a href="https://wa.me/8801806639158" target="_blank" class="btn btn-wa">
                <span class="btn-text">WhatsApp</span>
                <i class="fab fa-whatsapp"></i>
            </a>
        </div>
    </div>

</body>
</html>
