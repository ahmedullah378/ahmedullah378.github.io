<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Ullah | The Operator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059; /* Matching the business card gold */
            --dark-bg: #0A0F14; /* Deep charcoal black */
            --glass-panel: rgba(22, 29, 38, 0.6); /* Translucent panel */
            --glass-border: rgba(212, 175, 55, 0.15); /* Gold outline */
        }

        body {
            background-color: var(--dark-bg);
            color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden; /* Prevent scrolls on some mobile browsers */
        }

        /* The main reveal-panel */
        .reveal-container {
            width: 100%;
            max-width: 380px;
            background: var(--glass-panel);
            backdrop-filter: blur(15px); /* The "Glass" effect */
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            opacity: 0;
            transform: translateY(20px);
            animation: panelReveal 1s ease forwards;
        }

        @keyframes panelReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Photo */
        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover; /* Keeps aspect ratio */
            border: 2px solid var(--gold);
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 1px;
            color: #FFFFFF;
        }

        .title {
            color: var(--gold);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 10px 0 35px 0;
            display: block;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Icon left, text right, reveal center */
            padding: 14px 25px;
            text-decoration: none;
            color: #FFFFFF;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden; /* For the "reveal" shimmer */
        }

        /* The reveal shimmer animation on hover */
        .social-link::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(197, 160, 89, 0.2), transparent);
            transition: all 0.5s;
        }

        .social-link:hover::after {
            left: 100%;
        }

        .social-link:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(197, 160, 89, 0.1);
        }

        .social-link i {
            font-size: 1.1rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .social-link:hover i {
            opacity: 1;
        }

        .link-label {
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Custom WhatsApp look */
        .whatsapp {
            border-color: rgba(37, 211, 102, 0.2);
            color: #25D366;
        }
        .whatsapp:hover {
            border-color: #25D366;
            color: #FFFFFF;
            background: #25D366;
        }

        /* The revealing subtle glow around the main panel */
        .reveal-container::before {
            content: '';
            position: absolute;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            background: radial-gradient(circle at center, rgba(197, 160, 89, 0.1), transparent 70%);
            z-index: -1;
            filter: blur(20px);
            opacity: 0;
            animation: glowReveal 2s ease forwards 0.5s;
        }

        @keyframes glowReveal {
            to { opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="reveal-container">
        <img src="https://raw.githubusercontent.com/ahmedullah378/ahmedullah378.github.io/main/image_2.png" alt="Ahmed Ullah" class="profile-photo">
        
        <h1>Ahmed Ullah</h1>
        <span class="title">THE OPERATOR</span>

        <div class="links-container">
            <a href="https://facebook.com/Ahmedullah3778" class="social-link">
                <i class="fab fa-facebook-f"></i>
                <span class="link-label">Facebook</span>
            </a>
            <a href="https://instagram.com/highlypraised_78" class="social-link">
                <i class="fab fa-instagram"></i>
                <span class="link-label">Instagram</span>
            </a>
            <a href="https://tiktok.com/@ahmed_ullah.78" class="social-link">
                <i class="fab fa-tiktok"></i>
                <span class="link-label">TikTok</span>
            </a>
            <a href="https://wa.me/8801806639158" class="social-link whatsapp">
                <i class="fab fa-whatsapp"></i>
                <span class="link-label">Tap to Chat</span>
            </a>
        </div>
    </div>

</body>
</html>
