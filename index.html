<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Ullah | The Operator</title>
    <link rel="preload" as="image" href="profile.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --bg: #080B0E;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(197, 160, 89, 0.15);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 0;
        }

        .container {
            width: 90%;
            max-width: 340px;
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Image Optimization Styles */
        .img-wrapper {
            width: 115px;
            height: 115px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 1px solid var(--gold);
            padding: 4px;
            background: #111;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            /* Speed Hack: Smooth fade-in once loaded */
            transition: opacity 0.5s ease-in-out;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 0;
            letter-spacing: 2px;
        }

        .sub {
            color: var(--gold);
            font-size: 0.65rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 10px 0 35px;
            display: block;
            opacity: 0.7;
        }

        .section-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold);
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .project-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 30px;
            text-align: left;
        }

        .project-card h3 {
            font-size: 0.85rem;
            margin: 0 0 6px;
            color: var(--gold);
        }

        .project-card p {
            font-size: 0.72rem;
            line-height: 1.4;
            margin: 0;
            color: rgba(255,255,255,0.6);
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            padding: 16px;
            border-radius: 14px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .btn:hover {
            border-color: var(--gold);
            background: rgba(197, 160, 89, 0.05);
            transform: translateY(-2px);
        }

        .whatsapp {
            border-color: rgba(37, 211, 102, 0.2);
            color: #25D366;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="img-wrapper">
            <img src="profile.jpg" alt="Ahmed Ullah" loading="eager">
        </div>
        
        <h1>Ahmed Ullah</h1>
        <span class="sub">THE OPERATOR</span>

        <div class="section-label">Project</div>
        <div class="project-card">
            <h3>Hub-and-Spoke Automation</h3>
            <p>Python-powered pipeline connecting Slack and GitHub for automated document processing and repository syncing.</p>
        </div>

        <div class="section-label">Connect</div>
        <div class="links">
            <a href="https://facebook.com/Ahmedullah3778" target="_blank" class="btn">
                <span>Facebook</span>
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="https://instagram.com/highlypraised_78" target="_blank" class="btn">
                <span>Instagram</span>
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://tiktok.com/@ahmed_ullah.78" target="_blank" class="btn">
                <span>TikTok</span>
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://wa.me/8801806639158" target="_blank" class="btn whatsapp">
                <span>WhatsApp</span>
                <i class="fab fa-whatsapp"></i>
            </a>
        </div>
    </div>

</body>
</html>
